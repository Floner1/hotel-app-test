<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f6fa; }
        .container { text-align: center; padding: 2rem; }
        h1 { color: #2c3e50; font-size: 2rem; }
        p { color: #5a6c7d; font-size: 1.1rem; margin-top: 1rem; }
        a { color: #ffba5a; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 - Page Not Found</h1>
        <p>The page you are looking for does not exist or has been moved.</p>
        <p><a href="/">Return to Home</a></p>
    </div>
</body>
</html>
